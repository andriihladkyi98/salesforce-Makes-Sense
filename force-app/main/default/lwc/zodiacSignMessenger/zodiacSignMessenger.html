<template>
    <lightning-card class="slds-m-bottom_medium"  title="Find your Zodiac Match">
        <lightning-input class="slds-m-around_medium" value={userName} onchange={handleNameChange} type="text" label="Enter your name"></lightning-input>
        <lightning-input class="slds-m-around_medium" value={userBirthDate} onchange={handleDateChange} type="date" label="Enter your date of birth" ></lightning-input>
        <lightning-button  variant="brand" label="Hit It" title="Hit it" onclick={handleSubmit} class="slds-m-around_medium slds-align_absolute-center"></lightning-button>
    </lightning-card>

    <template lwc:if={resultReceived}>
        <div class="slds-align_absolute-center ">
            <lightning-card variant="Narrow" title="Here is a bit about you" icon-name={userProfile.emoji} footer={userProfile.sign}>
                <p class="slds-align_absolute-center slds-p-horizontal_small" >
                    {userProfile.emoji} {userProfile.trait}
                </p>
            </lightning-card>
        </div>
    </template>


    <!-- {userProfile.sign} 
    {userProfile.emoji} <br><br>
    {userProfile.trait}
     -->
</template>
