<template>
    <lightning-card class="slds-card" title="One way Binding"> 
        Hello {userName}! <br><br>
        You are currently at {subscriberScore} as of {currentTime}. <br><br>
        Your total watch duration is {totalLessonsWatched} minutes
    </lightning-card>

    <lightning-card class="slds-card" title="Two Way Binding">
        <lightning-input class="slds-p-around_small" value={memberStatus} onchange={updateMembersStatus} label="Enter your current status here"></lightning-input>
        <p class="slds-p-around_small">Value typed is: {memberStatus}</p>
    </lightning-card>

    <lightning-card class="slds-card" title="Getter & Setters">   
        <p class="slds-p-around_small">{minutesWatched}</p>

        <lightning-input class="slds-p-around_small" type="number" onchange={handleWatchChange}></lightning-input>
            <p class="slds-p-around_small">After setter is called: {minutesWatched}</p>
    </lightning-card> 

    
    
</template>
