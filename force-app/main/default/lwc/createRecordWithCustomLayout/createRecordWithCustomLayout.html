<template>
    <lightning-card title="Create a Record with custom layout without Apex">
        <template lwc:if={isAppBuilder}>
            <div class="slds-p-around_medium">
                Custom Case creation form preview
            </div>
        </template>

        <template lwc:else>
            <lightning-record-edit-form object-api-name={caseObject}>

                <lightning-messages></lightning-messages>

                <div class="slds-grid slds-wrap">
                    <div class="slds-col slds-size_2-of-3">
                        <lightning-input-field field-name="Subject" required></lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_1-of-3">
                        <lightning-input-field field-name="Reason"></lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_1-of-3">
                        <lightning-input-field field-name="Type"></lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_1-of-3">
                        <lightning-input-field field-name="Origin"></lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_1-of-3">
                        <lightning-input-field field-name="SLAViolation__c"></lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_3-of-3">
                        <lightning-input-field field-name="Description"></lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_3-of-3 slds-m-top_small">
                        <lightning-button
                            type="submit"
                            label="Create"
                            variant="brand"
                        ></lightning-button>
                        <lightning-button
                            type="reset"
                            class="slds-m-left_small"
                            label="Reset"
                            variant="destructive"
                        ></lightning-button>
                    </div>
                </div>
            </lightning-record-edit-form>
        </template>
    </lightning-card>
</template>
